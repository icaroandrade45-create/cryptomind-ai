<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>CryptoMind AI</title>
                <link rel="stylesheet" href="style.css">
                    <!-- SDK do Supabase -->
                        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
                        </head>
                        <body>
                            <div class="container">
                                    <!-- ÁREA DE AUTENTICAÇÃO -->
                                            <div id="areaAuth" class="card">
                                                        <h2>CryptoMind AI</h2>
                                                                    <p>Detalhes e Inteligência para Análise de Criptomoedas</p>
                                                                                
                                                                                            <div class="form-group">
                                                                                                            <label for="email">E-mail</label>
                                                                                                                            <input type="email" id="email" placeholder="teu@email.com">
                                                                                                                                        </div>
                                                                                                                                                    
                                                                                                                                                                <div class="form-group">
                                                                                                                                                                                <label for="senha">Senha</label>
                                                                                                                                                                                                <input type="password" id="senha" placeholder="Sua senha">
                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                        
                                                                                                                                                                                                                                    <div class="buttons">
                                                                                                                                                                                                                                                    <button id="btnEntrar" class="btn-primary">Entrar</button>
                                                                                                                                                                                                                                                                    <button id="btnCadastrar" class="btn-secondary">Cadastrar-se</button>
                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                <!-- PAINEL PRIVADO: CARTEIRA -->
                                                                                                                                                                                                                                                                                                        <div id="areaCarteira" class="card" style="display: none;">
                                                                                                                                                                                                                                                                                                                    <h3>Minha Carteira</h3>
                                                                                                                                                                                                                                                                                                                                <p>Gerencie seus ativos cripto associados à sua conta segura.</p>
                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                <!-- PAINEL PRIVADO: ANÁLISE -->
                                                                                                                                                                                                                                                                                                                                                        <div id="areaAnalise" class="card" style="display: none;">
                                                                                                                                                                                                                                                                                                                                                                    <h3>Análise do Mercado</h3>
                                                                                                                                                                                                                                                                                                                                                                                <p>Sinais de IA aplicados aos mercados de criptomoedas em tempo real.</p>
                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                <!-- BOTÃO DE SAIR -->
                                                                                                                                                                                                                                                                                                                                                                                                        <button id="btnSair" class="btn-danger" style="display: none;">Sair da Conta</button>
                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Scripts do Config e App -->
                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="config.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                        <script src="app.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                                                                                                                        </html>
